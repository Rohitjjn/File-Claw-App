name: files_claw
description: "Files Claw — Claude-styled offline file preview & editor."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.2
  flutter: ">=3.35.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.5.1

  # Storage / paths
  path_provider: ^2.1.4
  path: ^1.9.0
  shared_preferences: 2.5.3

  # UI / theme
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10+1
  shimmer: ^3.0.0
  flutter_slidable: ^3.1.1
  flutter_staggered_animations: ^1.1.1
  flutter_animate: ^4.5.0

  # File picking & handling
  file_picker: ^8.1.2
  open_filex: ^4.5.0
  mime: ^1.0.6
  permission_handler: ^11.3.1
  device_info_plus: ^10.1.2
  share_plus: ^10.0.2

  # Document preview
  flutter_markdown: ^0.7.3+1
  photo_view: ^0.15.0
  archive: ^3.6.1
  flutter_highlight: ^0.7.0
  highlight: ^0.7.0
  csv: ^6.0.0

  # Notifications
  flutter_local_notifications: ^17.2.3

  # Navigation
  go_router: ^14.2.7

  # Utilities
  intl: ^0.19.0
  url_launcher: ^6.3.0
  package_info_plus: ^8.0.2
  uuid: ^4.5.0
  equatable: ^2.0.5
  logger: ^2.4.0
  quick_actions: ^1.1.0
  flutter_overlay_window: ^0.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.4

flutter:
  uses-material-design: true
  assets:
    - assets/icons/

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icons/logo.png"

flutter_native_splash:
  color: "#282A36"
  image: "assets/icons/logo.png"
  android: true
  ios: false
  fullscreen: true
